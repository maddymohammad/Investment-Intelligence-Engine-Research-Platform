name: Daily Investment Pipeline

on:
  schedule:
    # 18:00 IST = 12:30 UTC, Mon–Fri
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Override run date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""

# Lets the built-in (free) GITHUB_TOKEN commit daily reports back to this repo.
permissions:
  contents: write

jobs:
  run-pipeline:
    name: Run daily analysis pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: db/
          key: investment-db-${{ github.run_number }}
          restore-keys: |
            investment-db-

      - name: Initialise database
        run: python -c "from src.storage.db import init_db; init_db()"

      - name: Bootstrap universe (if DB is new)
        run: |
          COUNT=$(python -c "from src.storage.db import init_db, get_session; from src.storage.repository import StockRepository; init_db(); s = __import__('contextlib').ExitStack(); sess = s.enter_context(get_session()); print(StockRepository().count(sess))" 2>/dev/null || echo "0")
          if [ "$COUNT" -lt "10" ]; then
            echo "Stock universe empty — bootstrapping..."
            python main.py bootstrap
          else
            echo "Universe has $COUNT stocks — skipping bootstrap"
          fi
        env:
          STOCK_UNIVERSE_SIZE: "150"

      - name: Run daily pipeline
        run: |
          if [ -n "${{ github.event.inputs.run_date }}" ]; then
            python main.py run --date "${{ github.event.inputs.run_date }}"
          else
            python main.py run
          fi
        env:
          # ── AI keys are OPTIONAL ─────────────────────────────────────
          # When these secrets are unset (₹0 mode), the pipeline
          # automatically uses the free rule-based narrative engine.
          # Add ANTHROPIC_API_KEY later and AI narratives switch on —
          # no code changes needed.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER: claude

          # ── Macro data (OPTIONAL — FRED keys are free at fred.stlouisfed.org) ──
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

          # ── Email report (OPTIONAL — Gmail app password is free) ─────
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}

          # ── Report commit — uses the FREE built-in Actions token ─────
          # Daily reports appear at reports/YYYY-MM-DD.md in this repo.
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main

          # ── Runtime safety ────────────────────────────────────────────
          STOCK_UNIVERSE_SIZE: "150"
          LOG_LEVEL: INFO

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/daily/
          if-no-files-found: ignore
          retention-days: 90
